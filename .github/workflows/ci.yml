name: AlpineJudge Tests

on: 
  push: 
      branches: [main]
  pull_request:
      branches: [main]

jobs:
  test: 
    runs-on: ubuntu-latest
            
    strategy:
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
    
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
        
      - name: Run Unit Tests
        working-directory: tests/unit
        run: go test -v ./...

      - name: Run Integration Tests
        working-directory: tests/integration
        run: go test -v ./...

      - name: Run E2E Tests
        working-directory: tests/e2e
        run: bash rune2e.sh