name: alpine-judge-runner

runner_id: runner-001

images:
  c     : ghcr.io/alpinejudge/gcc:v0.1.0
  cc    : ghcr.io/alpinejudge/gcc:v0.1.0
  cpp   : ghcr.io/alpinejudge/gcc:v0.1.0
  py    : ghcr.io/alpinejudge/python:v0.1.0
  go    : ghcr.io/alpinejudge/go:v0.1.0
  java  : ghcr.io/alpinejudge/java:v0.1.0
  js    : ghcr.io/alpinejudge/node:v0.1.0

scheduler:
  over_sub_factor: 2
  memory_reserve_percent: 20

limits:
  memory_limit_mb: 1024
  pid_limit: 128
  cpu_quota: 2
  no_new_privileges: true
  readonly_rootfs: true
  timeout_sec: 300